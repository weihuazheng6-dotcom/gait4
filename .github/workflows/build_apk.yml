name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter & Dart version
        run: |
          flutter --version
          dart --version

      # 关键步骤：如果 android/ 缺失辅助文件，自动通过 flutter create 生成
      - name: Restore Android scaffold if missing
        run: |
          if [ ! -f "android/gradlew" ] || [ ! -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️  Android scaffold missing, regenerating via flutter create..."
            # 备份用户自定义的 android 配置
            mkdir -p /tmp/android_backup
            cp -r android/* /tmp/android_backup/ 2>/dev/null || true
            # 让 flutter 重新生成标准 Android 脚手架
            flutter create --platforms=android --org com.example --project-name gait_detector .
            # 把用户的自定义配置还原（覆盖默认配置）
            cp -rf /tmp/android_backup/* android/ 2>/dev/null || true
            echo "✅ Android scaffold restored"
          else
            echo "✅ Android scaffold complete"
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew || true

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug --verbose

      - name: List APK output
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gait-detector-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
            android/app/build/
          retention-days: 7
