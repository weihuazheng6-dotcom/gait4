name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: false

      - name: Clean all caches
        run: |
          flutter clean
          rm -rf ~/.pub-cache/hosted/pub.dev/flutter_blue_plus*
          rm -rf .dart_tool
          rm -rf build

      - name: Get dependencies
        run: flutter pub get --no-offline

      - name: Create MainActivity if missing
        run: |
          MAIN_ACTIVITY="android/app/src/main/kotlin/com/example/gait_detector/MainActivity.kt"
          if [ ! -f "$MAIN_ACTIVITY" ]; then
            mkdir -p "$(dirname "$MAIN_ACTIVITY")"
            cat > "$MAIN_ACTIVITY" << 'EOF'
          package com.example.gait_detector

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity()
          EOF
          fi

      - name: Create Android resources
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/drawable-v21
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-night
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF
          cp android/app/src/main/res/drawable/launch_background.xml android/app/src/main/res/drawable-v21/

          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">?android:colorBackground</item>
              </style>
          </resources>
          EOF
          cp android/app/src/main/res/values/styles.xml android/app/src/main/res/values-night/

      - name: Generate launcher icons
        run: |
          # 生成一个简单的纯色 PNG 图标（base64 编码的 1x1 蓝色像素，缩放到各尺寸）
          # 使用 ImageMagick 生成不同尺寸的 ic_launcher.png
          sudo apt-get update && sudo apt-get install -y imagemagick

          # 创建一个 512x512 的蓝色图标作为源
          convert -size 512x512 xc:'#2196F3' \
            -gravity center \
            -pointsize 200 \
            -fill white \
            -annotate 0 'G' \
            /tmp/ic_launcher_src.png

          # 生成各种尺寸
          convert /tmp/ic_launcher_src.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/ic_launcher_src.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/ic_launcher_src.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/ic_launcher_src.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/ic_launcher_src.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "Icons generated successfully"
          ls -la android/app/src/main/res/mipmap-*/

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gait-detector-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
